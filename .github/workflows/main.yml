name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis
    
    # Step 2: Setup .NET SDK
    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # Step 3: Restore dependencies (with caching)
    - name: Restore dependencies
      run: dotnet restore
    
    # Step 4: Build solution
    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: 🗄️ Validate EF Core setup
      run: |
        dotnet ef --version || dotnet tool install --global dotnet-ef
        echo "EF Core tools ready"
    
    # Step 5: Run tests
    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage"
    
    # Step 6: Upload test results
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()  # Run even if tests fail
      with:
        name: test-results
        path: '**/TestResults/*.trx'
    
    # Step 7: Upload code coverage
    - name: Upload code coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-coverage
        path: '**/TestResults/*/coverage.cobertura.xml'
    
    # Step 8: Check code formatting
    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # Scan for vulnerable NuGet packages
    - name: Check for vulnerable packages
      run: |
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerabilities.txt
        if grep -q "has the following vulnerable packages" vulnerabilities.txt; then
          echo " Vulnerable packages found!"
          exit 1
        else
          echo "No vulnerable packages found"
        fi

  build-docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test  # Only run if tests pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image (validation only)
      run: |
        # We'll create the Dockerfile in Step 1.4
        # For now, this job is a placeholder
        echo "Docker build validation - skipped (Dockerfile not created yet)"
